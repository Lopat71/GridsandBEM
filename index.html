<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="/320styles.css" />
    <link rel="stylesheet" href="/fonts/TTLakes/stylesheet.css" />
  </head>
  <body>
    <header class="header">
      <nav class="header__menu">
        <a href="#">
          <img src="/SVG/HeaderSVG/burger.svg" />
        </a>
        <img src="/SVG/HeaderSVG/Group.svg" />
        <img src="/SVG/HeaderSVG/divider.svg" />
        <a href="#"><img src="/SVG/HeaderSVG/repair.svg" /> </a>
        <a href="#"><img src="/SVG/HeaderSVG/checkstatus.svg" /></a>
      </nav>
    </header>
    <section class="title">
      <h1 class="title__text">Услуги и сервисы</h1>
    </section>
    <section class="services">
      <button class="services__block">Ремонтируемые бренды</button>
      <button class="services__block">Ремонтируемые устройства</button>
      <button class="services__block">Цены на услуги</button>
      <button class="services__block">Адреса сервисных центров</button>
      <button class="services__block">Специальные цены</button>
    </section>
    <section class="info">
      <div class="info__text">
        Мы являемся авторизованным сервисным центром по ремонту техники Dell.
        Только у нас вы можете отремонтировать свой ноутбук Dell с официальной
        гарантией производителя.
      </div>
      <div class="info__more">
        <img src="/SVG/expand.svg" class="info__more-arrow" />
        <button class="info__more-read">Читать далее</button>
      </div>
      <img class="mainimg" src="/SVG/Picture Copy.svg" alt="Picture" />
    </section>
  </body>
</html>
